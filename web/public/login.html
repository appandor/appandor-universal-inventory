<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appandor Core — Sign In</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #111;">

    <div class="card" style="width: 100%; max-width: 400px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <div style="text-align: center; margin-bottom: 25px;">
            <svg width="45" height="45" viewBox="0 0 32 32" fill="none" xmlns="http://w3.org" style="color: #2e7d32; margin-bottom: 10px;">
                <rect width="32" height="32" rx="6" fill="#1e1e1e" stroke="#333"/>
                <path d="M8 22V10L16 15L24 10V22L16 27L8 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M8 10L16 15L24 10" stroke="currentColor" stroke-width="2"/>
                <path d="M16 15V27" stroke="currentColor" stroke-width="2"/>
            </svg>
            <h2 data-i18n="login_title" style="margin: 0; color: var(--text-color); font-size: 22px;">Loading...</h2>
            <p data-i18n="login_subtitle" style="color: #666; font-size: 13px; margin: 5px 0 0 0;">Loading...</p>
        </div>

        <div id="error-container" style="display: none; background: #c62828; color: #fff; padding: 10px; border-radius: 4px; font-size: 13px; font-weight: bold; margin-bottom: 20px; text-align: center;"></div>

        <form id="product-form" style="display: none;"></form>


        <form id="login-form">
            <div class="form-group" style="margin-bottom: 15px; text-align: left;">
                <label data-i18n="login_label_email" style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 13px;">Email Address *</label>
                <!-- KORREKTUR: Nutzt jetzt var(--input-bg), var(--border-color) und var(--text-color) -->
                <input type="email" id="email" required placeholder="z.B. hugo@appandor.de" style="width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px; box-sizing: border-box;">
            </div>
            <div class="form-group" style="margin-bottom: 20px; text-align: left;">
                <label data-i18n="login_label_password" style="display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 13px;">Password *</label>
                <!-- KORREKTUR: Nutzt jetzt var(--input-bg), var(--border-color) und var(--text-color) -->
                <input type="password" id="password" required placeholder="••••••••" style="width: 100%; padding: 10px; background: var(--input-bg); border: 1px solid var(--border-color); color: var(--text-color); border-radius: 4px; box-sizing: border-box;">
                
                <div style="text-align: right; margin-top: 8px;">
                    <a href="#" id="link-forgot-password" onclick="openForgotPasswordModal(event)" style="font-size: 11px; color: var(--text-muted); text-decoration: none; font-family: sans-serif;" data-i18n="link_forgot_password">Forgot password?</a>
                </div>
            </div>
            <button type="submit" id="submit-btn" style="width: 100%; padding: 12px; background: #2e7d32; color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                <span data-i18n="login_btn_submit">Sign In to Workspace</span>
            </button>
        </form>


    </div>

    <!-- ZUERST core.js laden für die i18n Übersetzungs-Engine, DANACH login.js -->
    <script src="js/core.js"></script>
    <script src="js/login.js"></script>

    <script>
        // Synchronisiert das Login-Fenster sofort mit dem gespeicherten Theme des Benutzers
        document.addEventListener("DOMContentLoaded", () => {
            const savedTheme = localStorage.getItem('appandor_theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });
    </script>



</body>
</html>
