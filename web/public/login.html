<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="login_title"></title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
  </head>
  <body class="login_body">
    <div class="login_lang-wrapper">
      <select id="language-selector" class="login_select">
        <!-- Wird von lang.js vollautomatisch befüllt -->
      </select>
    </div>
    <div class="login_card">
      <div class="login_header">
        <svg width="45" height="45" viewBox="0 0 32 32" fill="none" xmlns="http://w3.org" class="login_icon">
          <rect width="32" height="32" rx="6" fill="#1e1e1e" stroke="#333"/>
          <path d="M8 22V10L16 15L24 10V22L16 27L8 22Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M8 10L16 15L24 10" stroke="currentColor" stroke-width="2"/>
          <path d="M16 15V27" stroke="currentColor" stroke-width="2"/>
        </svg>
        <h2 data-i18n="login_title" class="login_main-title"></h2>
        <p data-i18n="login_subtitle" class="login_subtitle"></p>
      </div>
      <div id="error-container" class="login_error"></div>
      <form id="product-form" style="display: none;"></form>
      <form id="login_form">
        <div class="login_form-group">
          <label data-i18n="login_label_email" class="login_label"></label>
          <input type="email" id="email" required placeholder="z.B. hugo@appandor.de" class="login_input">
        </div>
        <div class="login_form-group" style="margin-bottom: 20px;">
          <label data-i18n="login_label_password" class="login_label"></label>
          <input type="password" id="password" required placeholder="••••••••" class="login_input">
          <div class="login_forgot-wrapper">
            <a href="#" id="login_forgot_password" onclick="openForgotPasswordModal(event)" class="login_link-forgot" data-i18n="login_forgot_password"></a>
          </div>
        </div>
        <button type="submit" id="submit-btn" class="login_btn-submit">
          <span data-i18n="login_btn_submit"></span>
        </button>
      </form>
    </div>
    <script src="js/config.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
