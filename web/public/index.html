<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appandor Core — Universal Multi-Tenant Inventory</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="font-family: sans-serif; background-color: #121212; color: #e0e0e0; padding: 40px; text-align: center;">

    <!-- TOP BAR: Language Selector -->
    <div style="position: absolute; top: 20px; right: 40px; display: flex; align-items: center; gap: 10px;">
        <select id="language-selector" style="background: #222; color: #fff; border: 1px solid #444; padding: 5px 10px; border-radius: 4px; font-weight: bold; cursor: pointer;">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
        </select>
    </div>

    <div style="max-width: 800px; margin: 80px auto; padding: 40px; background: #1e1e1e; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.5);">
        <header style="margin-bottom: 40px;">
            <h1 data-i18n="lp_title" style="font-size: 42px; color: #ffffff; margin: 0;">Loading...</h1>
            <p data-i18n="lp_subtitle" style="font-size: 16px; color: #888; margin-top: 8px;">Loading...</p>
        </header>

        <section style="margin-bottom: 50px; line-height: 1.6; color: #b0b0b0;">
            <p data-i18n="lp_description">Loading...</p>
            <p style="margin-top: 15px;">
                <strong data-i18n="lp_sandbox_highlight" style="color: #2e7d32;">Loading...</strong>
            </p>
        </section>

        <div style="display: flex; justify-content: center; gap: 20px;">
            <a href="dashboard.html" data-i18n="lp_btn_enter" style="display: inline-block; padding: 15px 35px; background: #2e7d32; color: white; text-decoration: none; font-weight: bold; border-radius: 6px; box-shadow: 0 2px 10px rgba(46,125,50,0.3);">
                Loading...
            </a>
            <a href="#pricing" data-i18n="lp_btn_pricing" style="display: inline-block; padding: 15px 35px; background: #333; color: #ccc; text-decoration: none; font-weight: bold; border-radius: 6px;">
                Loading...
            </a>
        </div>
    </div>

    <!-- Script triggers language rendering immediately -->
    <script src="js/core.js"></script>
</body>
</html>
