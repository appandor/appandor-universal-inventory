<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="lp_title">#lp_title#</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/landingpage.css">
  </head>
  <body class="lp-body">

    <div class="lp-lang-wrapper">
      <select id="language-selector" class="lp-select">
        <!-- Wird von lang.js vollautomatisch befüllt -->
      </select>
    </div>

    <div class="lp-container">
      <header class="lp-header">
        <h1 data-i18n="lp_title" class="lp-main-title">#lp_title#</h1>
        <p data-i18n="lp_subtitle" class="lp-subtitle">#lp_subtitle#</p>
      </header>

      <section class="lp-section">
        <p data-i18n="lp_description">#lp_description#</p>
        <p class="lp-highlight-box">
          <strong data-i18n="lp_sandbox_highlight" class="lp-highlight">#lp_sandbox_highlight#</strong>
        </p>
      </section>

      <div class="lp-btn-group">
        <a href="dashboard.html" data-i18n="lp_btn_enter" class="lp-btn-primary">
          #lp_btn_enter#
        </a>
        <a href="#pricing" data-i18n="lp_btn_pricing" class="lp-btn-secondary">
          #lp_btn_pricing#
        </a>
      </div>
    </div>
    <script src="js/config.js"></script>
  </body>
</html>
