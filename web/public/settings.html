<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_settings"></title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/settings.css">
  </head>
  <body>
    <!-- Sandbox Notice Bar — ID an eure globale Konvention angepasst -->
    <div id="gen_sandbox-banner" data-i18n="gen_sandbox_banner"></div>

    <!-- Das universelle, unsichtbare Schutzschild für den Gleichschritt -->
    <div class="lay_container">
      <!-- Der identische Injektionsort für das Core-Layout -->
      <div id="appandor-header"></div>

      <!-- ZENTRALER HAUPTKASTEN: EINSTELLUNGEN -->
      <div class="card">
        <p data-i18n="desc_settings" style="color: var(--text-muted); font-size: 14px; margin-bottom: 25px;"></p>
        
        <div class="settings-grid">
          <!-- KACHEL 1: PRODUKT-STAMMDATEN (AKTIV) -->
          <a href="products.html" id="tile-products" class="settings-tile active">
            <div class="settings-tile-category active-label" data-i18n="set_tile_master_data">Master Data</div>
            <span data-i18n="title_products">Product Masters</span>
          </a>

          <!-- KACHEL 2: KATEGORIEN (DISABLED) -->
          <div id="tile-categories" class="settings-tile disabled">
            <div class="settings-tile-category" data-i18n="set_tile_config">Configurations</div>
            <span data-i18n="set_tab_categories">Product Categories</span>
          </div>

          <!-- KACHEL 3: USER & LIZENZEN (DISABLED) -->
          <div id="tile-users" class="settings-tile disabled">
            <div class="settings-tile-category">Access Control</div>
            <span data-i18n="set_tab_users">User Licenses</span>
          </div>

          <!-- KACHEL 4: LAGERPLÄTZE (DISABLED) -->
          <div id="tile-infrastructure" class="settings-tile disabled">
            <div class="settings-tile-category" data-i18n="set_tile_logistics">Logistics</div>
            <span data-i18n="tbl_storage_location">Lagerplätze</span>
          </div>

          <!-- KACHEL 5: SCHUTZBOXEN (DISABLED) -->
          <div id="tile-boxes" class="settings-tile disabled">
            <div class="settings-tile-category" data-i18n="set_tile_logistics">Logistics</div>
            <span data-i18n="tbl_box_id">Schutzboxen</span>
          </div>

          <!-- KACHEL 6: DIE CHRONIK / DASHBOARD JOURNAL (DISABLED) -->
          <div id="tile-history" class="settings-tile disabled">
            <div class="settings-tile-category" data-i18n="set_tile_ledger">Financial Ledger</div>
            <span data-i18n="title_history">Chronik / Journal</span>
          </div>

          <!-- SUPERADMIN KACHEL: Live Translation Override (DISABLED — Standardmäßig über CSS ausgeblendet) -->
          <div id="tile-superadmin" class="settings-tile disabled superadmin-only">
            <div class="settings-tile-category" data-i18n="set_tile_core">Core Engine</div>
            <span data-i18n="set_tab_superadmin">Live Translation Override</span>
          </div>
        </div>
      </div>
    </div>

    <!-- SCHARFE LADEKETTE: config.js steuert auch das Einstellungs-System -->
    <script src="js/config.js"></script>
    
    <!-- Ein kleiner, unbestechlicher UI-Wächter direkt inline für die Inbound-Rolle -->
    <script>
      window.addEventListener("appandor_platform_ready", () => {
        // Falls die Seite fertig übersetzt ist, öffnen wir sofort den Vorhang
        window.dispatchEvent(new Event("appandor_render_complete"));
      });
    </script>
  </body>
</html>
