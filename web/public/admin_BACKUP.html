<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="gen_page_title_admin"></title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <!-- Sandbox Notice Bar -->
    <div id="gen_sandbox-banner" data-i18n="gen_sandbox_banner"></div>
    <div class="lay_container">
      <div id="appandor-header"></div>
      <div class="card">
        <div class="lay_toggle-header">
          <h3 id="admin-form-title" data-i18n="admin_title_control"></h3>
          <span class="lay_toggle-btn" data-i18n="btn_collapse"></span>
        </div>        
        <form class="lay_form-grid">
          <div style="display: flex; gap: 10px; align-items: center; width: auto;">
            <button type="button" id="admin-btn-restart" class="btn-receive-action" data-i18n="admin_btn_restart" style="margin: 0; height: 38px; padding: 0 20px; width: auto; min-width: 160px; box-sizing: border-box; background-color: #c62828 !important; color: #ffffff !important; border: none; font-weight: bold; text-transform: uppercase; font-size: 11px;"></button>
          </div>
        </form>
      </div>
      <div class="card" style="display: flex; flex-direction: column;">
        <h2 data-i18n="admin_title_content" style="margin-top: 0; padding-bottom: 10px;"></h2>        
        <ul class="settings-tab-container" style="margin: 0 0 20px 0; padding: 0; border-bottom: 1px solid var(--border-color);">
          <li><span id="admin-tab-tables" class="settings-tab-item active" style="cursor: pointer;" data-i18n="admin_tab_tables"></span></li>
          <li><span id="admin-tab-dbadmin" class="settings-tab-item" style="cursor: pointer;" data-i18n="admin_tab_dbadmin"></span></li>
          <li><span id="admin-tab-logs" class="settings-tab-item" style="cursor: pointer;" data-i18n="admin_tab_logs"></span></li>
          <li><span id="admin-tab-metrics" class="settings-tab-item" style="cursor: pointer;" data-i18n="admin_tab_metrics"></span></li>
        </ul>                
        <div class="form-group" style="width: 100%;">          
          <!-- Dropdown: Nur sichtbar bei "Database Tables" -->
          <div id="admin-table-filter-zone" style="max-width: 300px;">
            <label for="admin-table-select" data-i18n="admin_label_select_table"></label>
            <select id="admin-table-select" class="lay_input-select"></select>
          </div>
          <!-- SQL-Konsole: Nur sichtbar bei "Datenbank-Admin" -->
          <div id="admin-dbadmin-zone" style="display: none; width: 100%;">
            <label for="admin-sql-input" data-i18n="admin_label_sql_query" style="font-weight: bold; display: block; margin-bottom: 8px;"></label>
            <textarea id="admin-sql-input" placeholder="Z.B. ALTER TABLE ... oder SELECT * FROM ..." style="width: 100%; height: 120px; font-family: monospace; padding: 10px; box-sizing: border-box; resize: vertical; background: #1e1e1e; color: #00ff00; border: 1px solid var(--border-color); border-radius: 4px; font-size: 13px;"></textarea>
            <button type="button" id="admin-btn-execute-sql" class="btn-receive-action" data-i18n="admin_btn_execute_sql" style="margin-top: 10px; width: auto; min-width: 150px; height: 36px; padding: 0 20px; font-size: 11px; font-weight: bold; text-transform: uppercase; background-color: #2e7d32 !important; color: #ffffff !important; border: none;"></button>
            <div id="admin-sql-result-msg" style="margin-top: 15px; font-size: 12px; font-family: monospace; font-weight: bold; padding: 10px; border-radius: 4px; display: none;"></div>
          </div>
        </div>
        <!-- GEMEINSAMER CONTAINER FÜR TABELLEN-, REKORD- ODER LOG-AUSGABEN -->
        <div style="max-height: 530px; overflow-y: auto; padding-right: 5px; margin-top: 15px; flex: 1;">
          <div id="tbl_table-container">
            <p class="tbl_msg-empty" data-i18n="admin_msg_select_table_prompt"></p>
          </div>
        </div>
      </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/admin.js" defer></script>
  </body>
</html>
