<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title_inbound"></title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Hier greift nun unbestechlich eure spezifische Inbound-CSS! -->
    <link rel="stylesheet" href="css/inbound.css">
  </head>
  <body>
    <!-- Sandbox Notice Bar -->
    <div id="gen_sandbox-banner" data-i18n="gen_sandbox_banner"></div>

    <div class="lay_container">
      <div id="appandor-header"></div>

      <!-- 1. KASTEN: FORMULAR FÜR DEN WARENEINGANG -->
      <div class="card" id="inbound-form-card">
        <div id="inbound-toggle-header">
          <h3 data-i18n="inbound_form_title"></h3>
          <span id="inbound-toggle-btn" data-i18n="btn_collapse"></span>
        </div>
        
        <div id="inbound-error-message" class="tbl_msg-error" style="display: none;"></div>
        
        <form id="inbound-add-form" class="lay_form-grid">
          <div class="form-group">
            <label data-i18n="inbound_label_template"></label>
            <select id="inbound-product-select" class="lay_input-select"></select>
          </div>
          
          <div class="form-group">
            <label data-i18n="tbl_purchase_date"></label>
            <input type="date" id="inbound-date" value="2026-06-18" class="lay_input-date">
          </div>
          
          <div class="form-group">
            <label data-i18n="inbound_label_price"></label>
            <input type="number" id="inbound-price" step="0.01" min="0" placeholder="0.00 €" class="lay_input-number">
          </div>
          
          <div class="form-group">
            <label data-i18n="inbound_label_quantity"></label>
            <input type="number" id="inbound-quantity" value="1" min="1" class="lay_input-number text-center">
          </div>
          
          <div class="form-group">
            <label data-i18n="inbound_label_expected"></label>
            <input type="date" id="inbound-delivery-est" class="lay_input-date">
          </div>
          
          <!-- KORREKTUR: Nutzt jetzt eure perfekt definierte, globale Button-Klasse! -->
          <button type="submit" data-i18n="inbound_btn_activate" class="btn-primary-submit"></button>
        </form>
      </div>

      <!-- 2. KASTEN: DIE LIEFERLISTE (TABELLE) -->
      <div class="card">
        <div id="tbl_table-container">
          <p class="tbl_msg-empty" data-i18n="loading_inbound"></p>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/inbound-render.js" defer></script>
    <script src="js/inbound-modal.js" defer></script>
    <script src="js/inbound.js" defer></script>
  </body>
</html>
