<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="title_outbound"></title>
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <!-- Sandbox Notice Bar — ID an eure globale Konvention angepasst -->
    <div id="gen_sandbox-banner" data-i18n="gen_sandbox_banner"></div>

    <!-- Das universelle, unsichtbare Schutzschild für den Gleichschritt -->
    <div class="lay_container">
      <!-- Der identische Injektionsort für das Core-Layout -->
      <div id="appandor-header"></div>

      <!-- HAUPTKASTEN: WARENAUSGANG -->
      <div class="card">
        <p data-i18n="desc_outbound" class="tbl_msg-empty" style="text-align: left; padding: 0 0 15px 0; font-size: 14px;"></p>
        
        <!-- UNBESTECHLICH: Exakt dieselbe ID wie bei Inventory für deine globale table.css! -->
        <div id="tbl_table-container">
          <p class="tbl_msg-empty" data-i18n="loading_outbound"></p>
        </div>
      </div>
    </div>

    <!-- SCHARFE LADEKETTE: config.js steuert das System -->
    <script src="js/config.js"></script>
    <script src="js/outbound.js" defer></script>
  </body>
</html>
