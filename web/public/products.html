<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav_products"></title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/inbound.css">
  </head>
  <body>
    <!-- Sandbox Notice Bar -->
    <div id="gen_sandbox-banner" data-i18n="gen_sandbox_banner"></div>
    
    <div class="lay_container">
      <div id="appandor-header"></div>

      <!-- HORIZONTALE TAB-REIHE (SUBMENÜ) -->
      <ul class="settings-tab-container">
        <li><a href="products.html" class="settings-tab-item active" data-i18n="nav_products"></a></li>
        <li><a href="#" class="settings-tab-item" data-i18n="set_tab_categories"></a></li>
        <li><a href="#" class="settings-tab-item" data-i18n="set_tab_users"></a></li>
        <li><a href="#" class="settings-tab-item" data-i18n="tbl_storage_location"></a></li>
      </ul>

      <!-- 1. BEREICH: FORMULAR-KASTEN (STARTET STANDARDMÄSSIG EINGEKLAPPT) -->
      <div class="card" id="product-form-card" data-state="collapsed">
        <div class="lay_toggle-header" id="inbound-toggle-header">
          <h3 id="product-form-title" data-i18n="prod_add_title"></h3>
          <span id="inbound-toggle-btn" data-i18n="btn_expand" data-state="collapsed"></span>
        </div>
        
        <!-- FIX: Kein blockierendes Flex-Grid mehr, die native Tabellen-Engine richtet alles aus! -->
        <form id="product-form" style="display: none;">
          <input type="hidden" id="product-id-hidden" value="">

          <table class="tbl_table">
            <thead>
              <tr>
                <th data-i18n="prod_label_name"></th>
                <th data-i18n="prod_label_barcode"></th>
                <th data-i18n="prod_label_category"></th>
                <th data-i18n="prod_label_minstock" class="tbl_text-center"></th>
                <th class="tbl_text-center" data-i18n="tbl_action"></th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td class="tbl_cell-form">
                  <input type="text" id="name" required data-i18n-placeholder="prod_placeholder_name" class="lay_input-select">
                </td>
                <td class="tbl_cell-form">
                  <input type="text" id="barcode" data-i18n-placeholder="prod_placeholder_barcode" class="lay_input-date">
                </td>
                <td class="tbl_cell-form">
                  <select id="category" required class="lay_input-number"></select>
                </td>
                <td class="tbl_cell-form">
                  <input type="number" id="minimum_stock" value="0" min="0" class="lay_input-number text-center">
                </td>
                <td class="tbl_cell-form tbl_text-right" style="white-space: nowrap; width: 220px;">
                  <!-- FIX: Buttons nutzen eure zierliche Klasse und sitzen ohne Behelfs-Divs felsenfest in der Zelle -->
                  <button type="submit" id="product-btn-submit" class="btn-receive-action" data-i18n="btn_save"></button>
                  <button type="button" id="product-btn-cancel" class="btn-receive-action" data-i18n="btn_cancel" style="display: none; background-color: var(--text-muted) !important; color: white !important; border: none;"></button>
                </td>
              </tr>
            </tbody>
          </table>
        </form>
      </div>

      <!-- 2. BEREICH: DIE SYSTEM-LISTE (TABELLE ÜBER DIE VOLLE BREITE) -->
      <div class="card">
        <div style="max-height: 530px; overflow-y: auto; padding-right: 5px;">
          <div id="tbl_table-container">
            <p class="tbl_msg-empty" data-i18n="loading_products"></p>
          </div>
        </div>
      </div>

    </div>

    <!-- ZENTRALE LADEKETTE -->
    <script src="js/config.js"></script>
    <script src="js/products_render.js" defer></script>
    <script src="js/products.js" defer></script>
  </body>
</html>
